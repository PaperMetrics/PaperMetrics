services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__ # Evitar conflitos de cache
      - ./backend/uploads:/app/uploads
    env_file:
      - ./backend/.env
    networks:
      - scistat-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Evitar sobrepor módulos locais com os do contêiner
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - scistat-network

networks:
  scistat-network:
    driver: bridge
